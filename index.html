<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAYBANK</title>
  <style>
    :root{--bg:#0b1220;--card:#0f1b2b;--accent:#2bd48b;--muted:#98a0b3;--danger:#ff6b6b}
    body{font-family:Inter,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#071023,#071122);color:#e6eef8;margin:0;padding:24px;min-height:100vh}
    .container{max-width:900px;margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    h1{font-size:20px;margin:0}
    .card{background:var(--card);padding:14px;border-radius:10px;box-shadow:0 6px 18px rgba(2,8,23,.6);margin-bottom:12px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1;min-width:220px}
    input,select,button{padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:transparent;color:inherit}
    button{cursor:pointer;border:0;background:var(--accent);color:#042224;font-weight:600}
    .btn-danger{background:var(--danger);color:#200}
    .accounts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .acct{background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);padding:12px;border-radius:8px}
    .acct h3{margin:0 0 6px 0;font-size:14px}
    .balance{font-family:monospace;font-size:18px}
    .controls{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
    .log{max-height:160px;overflow:auto;font-size:13px;color:var(--muted);background:rgba(255,255,255,.02);padding:8px;border-radius:6px}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Banco Mock — Zoação</h1>
      <div style="font-size:13px;color:var(--muted)">Local &amp; offline — simulação</div>
    </header>

    <div class="card">
      <div class="row">
        <div class="col">
          <label>Nome da conta</label>
          <input id="newName" placeholder="Ex: João" />
        </div>
        <div class="col">
          <label>Saldo inicial (R$)</label>
          <input id="newBalance" type="number" value="100.00" />
        </div>
        <div style="align-self:end">
          <button id="createBtn">Criar conta</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;gap:12px;align-items:end;flex-wrap:wrap">
        <div style="flex:1;min-width:220px">
          <label>Conta origem</label>
          <select id="fromSelect"></select>
        </div>
        <div style="flex:1;min-width:220px">
          <label>Conta destino</label>
          <select id="toSelect"></select>
        </div>
        <div style="width:140px">
          <label>Valor (R$)</label>
          <input id="amount" type="number" value="10.00" />
        </div>
        <div style="align-self:end">
          <button id="transferBtn">Transferir</button>
        </div>
        <div style="align-self:end">
          <button id="fakeBigBtn" class="btn-danger">Gerar notificação FAKE</button>
        </div>
      </div>
      <div style="margin-top:10px">
        <label>Opções de edição rápida</label>
        <div class="controls">
          <button id="addMoney">+ R$100</button>
          <button id="subMoney" class="btn-danger">- R$100</button>
          <select id="quickSelect"></select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:16px;margin:0 0 8px 0">Contas</h2>
      <div id="accounts" class="accounts"></div>
    </div>

    <div class="card">
      <h2 style="font-size:16px;margin:0 0 8px 0">Registro / Log</h2>
      <div id="log" class="log"></div>
    </div>
  </div>

  <template id="acctTpl">
    <div class="acct">
      <h3 class="name"></h3>
      <div class="balance">R$ <span class="value">0.00</span></div>
      <div class="controls">
        <button class="editAdd">+ R$10</button>
        <button class="editSub btn-danger">- R$10</button>
        <button class="rename">Renomear</button>
        <button class="delete btn-danger">Deletar</button>
      </div>
    </div>
  </template>

  <script>
    // Simples armazenamento local (localStorage)
    const storageKey = 'bankMockAccounts_v1';
    let accounts = loadAccounts();

    function loadAccounts() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }
    function saveAccounts() {
      localStorage.setItem(storageKey, JSON.stringify(accounts));
      renderAll();
    }

    // Util
    function fmt(v){ return Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
    function now(){ return new Date().toLocaleString(); }
    function log(text){
      const el = document.getElementById('log');
      el.innerHTML = `<div>[${now()}] ${text}</div>` + el.innerHTML;
    }

    // UI refs
    const accountsEl = document.getElementById('accounts');
    const fromSelect = document.getElementById('fromSelect');
    const toSelect = document.getElementById('toSelect');
    const quickSelect = document.getElementById('quickSelect');

    // Render
    function renderAll(){
      // accounts list
      accountsEl.innerHTML = '';
      fromSelect.innerHTML = '<option value="">—</option>';
      toSelect.innerHTML = '<option value="">—</option>';
      quickSelect.innerHTML = '<option value="">—</option>';
      accounts.forEach((a, idx) => {
        const tpl = document.getElementById('acctTpl').content.cloneNode(true);
        tpl.querySelector('.name').textContent = a.name;
        tpl.querySelector('.value').textContent = fmt(a.balance);
        // buttons
        tpl.querySelector('.editAdd').addEventListener('click', ()=> adjustBalance(idx, 10));
        tpl.querySelector('.editSub').addEventListener('click', ()=> adjustBalance(idx, -10));
        tpl.querySelector('.rename').addEventListener('click', ()=> renameAccount(idx));
        tpl.querySelector('.delete').addEventListener('click', ()=> { if(confirm('Deletar conta?')) { accounts.splice(idx,1); saveAccounts(); log(`Conta "${a.name}" deletada.`); } });
        accountsEl.appendChild(tpl);
        // selects
        const opt = document.createElement('option'); opt.value = idx; opt.textContent = `${a.name} — R$ ${fmt(a.balance)}`;
        fromSelect.appendChild(opt.cloneNode(true));
        toSelect.appendChild(opt.cloneNode(true));
        quickSelect.appendChild(opt);
      });
    }

    function adjustBalance(idx, delta){
      accounts[idx].balance = Number((Number(accounts[idx].balance) + delta).toFixed(2));
      saveAccounts();
      log(`${delta >= 0 ? 'Adicionado' : 'Subtraído'} R$ ${fmt(Math.abs(delta))} em "${accounts[idx].name}". Saldo: R$ ${fmt(accounts[idx].balance)}.`);
    }

    function renameAccount(idx){
      const newName = prompt('Novo nome para a conta', accounts[idx].name);
      if(newName) { accounts[idx].name = newName; saveAccounts(); log(`Conta renomeada para "${newName}".`); }
    }

    // Create
    document.getElementById('createBtn').addEventListener('click', () => {
      const name = document.getElementById('newName').value.trim() || `Conta ${accounts.length+1}`;
      const bal = parseFloat(document.getElementById('newBalance').value) || 0;
      accounts.push({ name, balance: Number(bal.toFixed(2)) });
      saveAccounts();
      log(`Conta "${name}" criada com R$ ${fmt(bal)}.`);
      document.getElementById('newName').value = '';
    });

    // Quick add/sub
    document.getElementById('addMoney').addEventListener('click', ()=>{
      const sel = quickSelect.value;
      if(sel === '') return alert('Selecione uma conta.');
      adjustBalance(Number(sel), 100);
    });
    document.getElementById('subMoney').addEventListener('click', ()=>{
      const sel = quickSelect.value;
      if(sel === '') return alert('Selecione uma conta.');
      adjustBalance(Number(sel), -100);
    });

    // Transfer
    document.getElementById('transferBtn').addEventListener('click', ()=>{
      const from = fromSelect.value; const to = toSelect.value;
      const amt = Number(document.getElementById('amount').value) || 0;
      if(from === '' || to === '' || from === to) return alert('Selecione contas válidas (origem ≠ destino).');
      if(amt <= 0) return alert('Valor deve ser maior que zero.');
      const f = accounts[Number(from)]; const t = accounts[Number(to)];
      f.balance = Number((f.balance - amt).toFixed(2));
      t.balance = Number((t.balance + amt).toFixed(2));
      saveAccounts();
      log(`Transferido R$ ${fmt(amt)} de "${f.name}" para "${t.name}".`);
    });

    // Fake notification (para zoar)
    document.getElementById('fakeBigBtn').addEventListener('click', ()=>{
      const sel = fromSelect.value || quickSelect.value;
      if(sel === '') return alert('Selecione uma conta para a notificação.');
      const acc = accounts[Number(sel)];
      // cria uma notificação visual grande (não sistema) na página
      const toast = document.createElement('div');
      toast.style.position='fixed';
      toast.style.right='20px';
      toast.style.top='20px';
      toast.style.background='linear-gradient(90deg,#10212a,#12333d)';
      toast.style.padding='18px';
      toast.style.borderRadius='10px';
      toast.style.boxShadow='0 8px 30px rgba(2,8,23,.7)';
      toast.innerHTML = `<strong>Alerta: Transação não autorizada</strong><div style="margin-top:6px">Conta <em>${acc.name}</em>: débito R$ ${fmt(9999)}</div>`;
      document.body.appendChild(toast);
      setTimeout(()=> toast.remove(), 6000);
      log(`Notificação FAKE mostrada para "${acc.name}".`);
    });

    // init demo accounts if empty
    if(accounts.length === 0){
      accounts = [
        { name: 'Lucas', balance: 120.50 },
        { name: 'Mariana', balance: 42.00 },
        { name: 'Conta Zoação', balance: 999.99 }
      ];
      saveAccounts();
    } eflexoã      renderAll();
    }

    // Expose for console tinkering
    window.bankMock = {
      accounts, saveAccounts, loadAccounts
    };
  </script>
</body>
        </html>
